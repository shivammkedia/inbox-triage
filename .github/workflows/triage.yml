name: inbox-triage

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no drafts written)"
        required: false
        default: "false"

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.11
      - run: uv sync
      - name: Sanity-check secrets (lengths only, no values)
        run: |
          for v in GROQ_API_KEY GMAIL_CLIENT_ID GMAIL_CLIENT_SECRET GMAIL_REFRESH_TOKEN SUPABASE_URL SUPABASE_KEY TELEGRAM_BOT_TOKEN TELEGRAM_CHAT_ID; do
            val="${!v}"
            if [ -z "$val" ]; then
              echo "MISSING: $v"
            else
              echo "OK: $v (length=${#val})"
            fi
          done
        env:
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          GMAIL_CLIENT_ID:     ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:        ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
      - name: Telegram probe (prints API response, masks token)
        run: |
          resp=$(curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="probe from GitHub Actions $(date -u +%H:%M:%SZ)")
          echo "Telegram response: $resp"
        env:
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
      - run: uv run python -m src.main
        env:
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY:  ${{ secrets.OPENROUTER_API_KEY }}
          GMAIL_CLIENT_ID:     ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:        ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          DRY_RUN:             ${{ github.event.inputs.dry_run || 'false' }}
          MAX_EMAILS_PER_RUN:  "20"
          LOOKBACK_HOURS:      "2"
